// ── MACRO CALCULATOR (Anthropic API) ─────────────────────────────
async function calculateMacrosViaAI(recipeName, variants, defaultPortions) {
  const lines = [];
  lines.push("Calculate nutritional macros PER SERVING for: " + recipeName + " (serves " + defaultPortions + ").");
  lines.push('Reply ONLY with JSON, no markdown: {"variants":{"<name>":{"base":{"calories":0,"protein":0,"carbs":0,"fat":0},"optionals":[{"name":"","calories":0,"protein":0,"carbs":0,"fat":0}]}}}');
  lines.push("Include oil/butter. All integers per serving.");
  lines.push("VARIANTS:");
  for (const v of variants) {
    const nm = v.name || "default";
    const mainIngs = v.ingredients.filter(i => !i.optional && i.name.trim()).map(i => i.quantity + " " + i.unit + " " + i.name).join(", ");
    const optIngs = v.ingredients.filter(i => i.optional && i.name.trim()).map(i => i.quantity + " " + i.unit + " " + i.name).join(", ");
    lines.push(nm + " (main): " + mainIngs);
    if (optIngs) lines.push(nm + " (optionals): " + optIngs);
  }
  const prompt = lines.join("\n");
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: prompt
        }]
      })
    });
    const data = await resp.json();
    const text = (data.content || []).find(b => b.type === "text")?.text || "";
    const clean = text.replace(/```json|```/g, "").trim();
    return JSON.parse(clean);
  } catch (e) {
    console.error("Macro calc error:", e);
    return null;
  }
}

// ── STORAGE ──────────────────────────────────────────────────────
// In-memory cache ensures state survives tab switches in same session.
// Persistence: window.storage (Claude Artifacts) → localStorage fallback.
// Circuit breaker: if window.storage fails once, disable it for the session
// (avoids the broken Android WebView case where the API exists but throws).

const _memCache = {};
let _winStorageBroken = false;
const _hasWinStorage = () => {
  if (_winStorageBroken) return false;
  try {
    return typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
  } catch {
    return false;
  }
};
const _hasLocalStorage = () => {
  try {
    localStorage.setItem("_t", "1");
    localStorage.removeItem("_t");
    return true;
  } catch {
    return false;
  }
};
const Store = {
  async load(k) {
    // 1. In-memory cache first (always works, survives tab switches)
    if (_memCache[k] !== undefined) return _memCache[k];
    // 2. Try window.storage
    if (_hasWinStorage()) {
      try {
        const r = await window.storage.get(k);
        if (r) {
          const v = JSON.parse(r.value);
          _memCache[k] = v;
          return v;
        }
      } catch (e) {
        console.warn("window.storage.get failed, disabling for session:", e.message || e);
        _winStorageBroken = true;
      }
    }
    // 3. Try localStorage
    if (_hasLocalStorage()) {
      try {
        const v = localStorage.getItem("mpa_" + k);
        if (v) {
          const parsed = JSON.parse(v);
          _memCache[k] = parsed;
          return parsed;
        }
      } catch {}
    }
    return null;
  },
  async save(k, v) {
    // Always update in-memory cache first
    _memCache[k] = v;
    // Try window.storage, but trip circuit breaker on failure
    if (_hasWinStorage()) {
      try {
        await window.storage.set(k, JSON.stringify(v));
        // Also mirror to localStorage as belt-and-suspenders for cross-device backup
        if (_hasLocalStorage()) {
          try {
            localStorage.setItem("mpa_" + k, JSON.stringify(v));
          } catch {}
        }
        return;
      } catch (e) {
        console.warn("window.storage.set failed, disabling for session:", e.message || e);
        _winStorageBroken = true;
      }
    }
    // Fallback: localStorage
    if (_hasLocalStorage()) {
      try {
        localStorage.setItem("mpa_" + k, JSON.stringify(v));
      } catch {}
    }
  },
  async clear(k) {
    delete _memCache[k];
    if (_hasWinStorage()) {
      try {
        await window.storage.delete(k);
      } catch (e) {
        _winStorageBroken = true;
      }
    }
    if (_hasLocalStorage()) {
      try {
        localStorage.removeItem("mpa_" + k);
      } catch {}
    }
  }
};

// ── MIGRATION ─────────────────────────────────────────────────────
function migrateRecipe(r) {
  const withCategory = r.category ? r : {
    ...r,
    category: "mine"
  };
  const withLabels = withCategory.tags?.labels ? withCategory : {
    ...withCategory,
    tags: {
      ...withCategory.tags,
      labels: []
    }
  };
  if (!withLabels.variants) {
    const variantId = vid();
    return {
      ...withLabels,
      defaultVariantId: variantId,
      variants: [{
        id: variantId,
        name: "",
        ingredients: (r.ingredients || []).map(i => ({
          ...i,
          optional: false
        })),
        steps: r.steps || [],
        notes: r.notes || "",
        macros: {
          calories: 0,
          protein: 0,
          carbs: 0,
          fat: 0
        }
      }]
    };
  }
  // Add macros to variants that don't have them
  return {
    ...withLabels,
    variants: withLabels.variants.map(v => v.macros ? v : {
      ...v,
      macros: {
        calories: 0,
        protein: 0,
        carbs: 0,
        fat: 0
      },
      optionalMacros: v.optionalMacros || []
    })
  };
}

// ── DATE UTILS ────────────────────────────────────────────────────
const DAY_FULL = ["Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];
const MONTH_FR = ["jan", "fév", "mar", "avr", "mai", "jun", "jul", "aoû", "sep", "oct", "nov", "déc"];
function getMonday(d) {
  const dt = new Date(d);
  dt.setHours(0, 0, 0, 0);
  const day = dt.getDay();
  dt.setDate(dt.getDate() + (day === 0 ? -6 : 1 - day));
  return dt;
}
function addDays(d, n) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() + n);
  return dt;
}
function toISO(d) {
  return d.toISOString().slice(0, 10);
}
function fmtRange(mon) {
  const sun = addDays(mon, 6);
  return mon.getDate() + " " + MONTH_FR[mon.getMonth()] + " – " + sun.getDate() + " " + MONTH_FR[sun.getMonth()];
}
function isToday(s) {
  return s === toISO(new Date());
}

// ── PLAN UTILS ────────────────────────────────────────────────────
function buildEmpty(mon) {
  return {
    weekStartDate: toISO(mon),
    days: Array.from({
      length: 7
    }, (_, i) => ({
      date: toISO(addDays(mon, i)),
      cooked: [],
      lunch: null,
      dinner: null,
      actions: []
    }))
  };
}
function getVariant(recipe, variantId) {
  if (!recipe || !recipe.variants) return null;
  return recipe.variants.find(v => v.id === variantId) || recipe.variants[0];
}
function getDefaultVariant(recipe) {
  if (!recipe || !recipe.variants) return null;
  return recipe.variants.find(v => v.id === recipe.defaultVariantId) || recipe.variants[0];
}
function getAvailable(plan, dayIdx, recipes) {
  const target = plan.days[dayIdx].date;
